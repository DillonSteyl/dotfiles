os:
  editPreset: "nvim-remote"
gui:
  nerdFontsVersion: "3"
customCommands:
  - key: S
    description: "Git Spice"
    commandMenu:
      - key: n
        description: "Navigate"
        commandMenu:
          - key: u
            description: "Up"
            command: "git-spice up"
            context: "localBranches"
          - key: d
            description: "Down"
            command: "git-spice down"
            context: "localBranches"
          - key: b
            description: "Bottom"
            command: "git-spice bottom"
            context: "localBranches"
          - key: t
            description: "Top"
            command: "git-spice top"
            context: "localBranches"
      - key: s
        description: "Stack"
        commandMenu:
          - key: r
            description: "Restack"
            context: "localBranches"
            command: "git-spice stack restack"
          - key: s
            description: "Submit (Update Only)"
            context: "localBranches"
            command: "git-spice stack submit --update-only"
          - key: o
            description: "Upstack [O]nto"
            context: "localBranches"
            command: "git-spice upstack onto {{.SelectedLocalBranch.Name}}"
            prompts:
              - type: "confirm"
                title: "Move Branch"
                body: "Move {{.CheckedOutBranch.Name}} onto {{.SelectedLocalBranch.Name}}?"
      - key: b
        description: "Branch"
        commandMenu:
          - key: c
            description: "Create"
            context: "localBranches"
            prompts:
              - type: "input"
                title: "Branch Name"
                key: "BranchName"
            command: "git-spice branch create --no-commit {{.Form.BranchName}}"
          - key: f
            description: "Fold"
            context: "localBranches"
            command: "git-spice branch fold"
          - key: s
            description: "Submit"
            commandMenu:
              - key: a
                description: "Submit (Autofill)"
                context: "localBranches"
                command: "git-spice branch submit --fill"
              - key: m
                description: "Submit (Manual)"
                context: "localBranches"
                prompts:
                  - type: "input"
                    title: "CR Title"
                    description: "Title of the change request"
                    key: "CrTitle"
                  - type: "input"
                    title: "CR Body"
                    description: "Body of the change request"
                    key: "CrBody"
                  - type: "menu"
                    title: "CR Status?"
                    key: "CrDraft"
                    options:
                      - name: "Draft"
                        value: "--draft"
                      - name: "Ready For Review"
                        value: "--no-draft"
                command: "git-spice branch submit {{.Form.CrDraft}} --title='{{.Form.CrTitle}}' --body='{{.Form.CrBody}}' --fill"
          - key: t
            description: "Track"
            context: "localBranches"
            command: "git-spice branch track"
      - key: r
        description: "Repo"
        commandMenu:
          - key: i
            description: "Init"
            context: "localBranches"
            prompts:
              - type: "input"
                title: "Trunk Branch"
                key: "TrunkBranch"
                initialValue: "main"
            command: "git-spice repo init --trunk={{.Form.TrunkBranch}}"
